# ============================================================================
# Default Open Hours by Bar Type
# ============================================================================
# Close times past midnight use 24+ (e.g., "26:00" = 2am next day).
# null means closed that day.
# ----------------------------------------------------------------------------

_version: "1.0"

standard_bar:
  description: "Generic bar. 4pm open, 2am close."
  hours:
    mon: null
    tue: ["16:00", "26:00"]
    wed: ["16:00", "26:00"]
    thu: ["16:00", "26:00"]
    fri: ["16:00", "28:00"]
    sat: ["14:00", "28:00"]
    sun: ["14:00", "24:00"]
  default_happy_hour:
    days: [tue, wed, thu, fri]
    start: "16:00"
    end: "19:00"
    details: "$2 off drafts, $3 off cocktails"
    bonus: 0.20
  default_specials: []

