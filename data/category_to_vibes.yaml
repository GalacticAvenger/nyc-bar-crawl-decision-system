# ----------------------------------------------------------------------------
# user_note → vibe overrides (strongest signal)
# ----------------------------------------------------------------------------

user_note_overrides:
  - pattern: "whispering"
    add_vibes: [quiet, cozy]
    force_noise: library
  - pattern: "piano"
    add_vibes: [live-band, polished]
  - pattern: "laptop friendly"
    add_vibes: [quiet, walk-in]
  - pattern: "roof takeover"
    add_vibes: [rooftop, airy, lively]
  - pattern: "can book"
    add_vibes: [large-groups, birthday-party]
  - pattern: "aperol"
    add_vibes: [unpretentious, post-work]
  - pattern: "birthday"
    add_vibes: [birthday-party, lively, large-groups]
  - pattern: "never can say goodbye"
    add_vibes: [touristy, retro, historic, music-loud]


# ----------------------------------------------------------------------------
# primary_function → additional vibe tags
# ----------------------------------------------------------------------------

primary_function_overrides:
  neighborhood_bar:              {add_vibes: [unpretentious, local-institution]}
