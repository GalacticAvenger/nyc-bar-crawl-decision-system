user_note_overrides:
  - pattern: "whispering"
    add_vibes: [quiet, cozy]
    force_noise: library
  - pattern: "piano"
    add_vibes: [themed, polished]
  - pattern: "laptop friendly"
    add_vibes: [chill, quiet]
  - pattern: "roof takeover"
    add_vibes: [outdoor, airy, lively]
  - pattern: "can book"
    add_vibes: [large-groups, birthday-party]
  - pattern: "aperol"
    add_vibes: [chill, unpretentious]
  - pattern: "birthday"
    add_vibes: [birthday-party, lively, large-groups]
  - pattern: "never can say goodbye"
    add_vibes: [touristy, themed, historic, loud]


primary_function_overrides:
  neighborhood_bar:              {add_vibes: [unpretentious, local-institution, chill]}
