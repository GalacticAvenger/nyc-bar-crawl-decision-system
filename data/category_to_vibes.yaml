  tiki_bar:                      {add_vibes: [tiki, lively, touristy]}
  irish_pub:                     {add_vibes: [local-institution, unpretentious]}
  craft_beer_bar:                {add_vibes: [hipster, unpretentious]}
  dive_bar:                      {add_vibes: [divey, unpretentious]}
  board_game_bar:                {add_vibes: [games, hidden-gem]}
