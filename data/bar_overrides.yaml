# ============================================================================
# Hand-curated per-bar vibe overrides
# ============================================================================
# Domain knowledge layer on top of the auto-inference in enrich_bars.py.
# For bars where the category default + user_note + primary_function don't
# capture the bar's real character in the NYC scene, add specific vibes here.
#
# Format:
#   "Exact bar name (must match data/seed_bars.json)":
#     add_vibes: [list]
#     note: "why (optional)"
#
# Rule: every `add_vibes` entry must be a valid vibe from vibe_vocab.json v2.
# ----------------------------------------------------------------------------

